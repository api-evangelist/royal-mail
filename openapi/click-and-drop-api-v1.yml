swagger: "2.0"
info:
  title: ChannelShipper & Royal Mail Public API
  description: Import your orders, retrieve your orders and generate labels.
  version: 1.0.0

basePath: /api/v1
produces:
  - application/json
consumes:
  - application/json
paths:
  /version:
    get:
      tags:
        - Version
      summary: Get API version details.
      operationId: GetVersionAsync
      responses:
        '200':
          description: Returns details about the API version
          schema:
            $ref: '#/definitions/GetVersionResource'
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'

  /orders/{orderIdentifiers}:
    get:
      tags:
        - Orders
      summary: Retrieve specific orders
      operationId: GetSpecificOrdersAsync
      parameters:
        - $ref: '#/parameters/orderIdentifiers'
      responses:
        '200':
          description: Return list of specific orders
          schema:
            type: array
            items:
              $ref: '#/definitions/GetOrderInfoResource'
        '400':
          description: Bad Request (Request has missing or invalid parameters and cannot be parsed)
          schema:
            type: array
            items:
              $ref: '#/definitions/OrderErrorResponse'
        '401':
          description: Unauthorized
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - Bearer: []

    delete:
      tags:
        - Orders
      summary: Delete orders
      description: |
        Please be aware labels generated on orders which are deleted are no longer valid and must be destroyed.

        Cancelled label information is automatically shared with Royal Mail Revenue Protection, and should
        a cancelled label be identified on an item in the Royal Mail Network, you will be charged on your account
        and an additional handling fee applied.
      operationId: DeleteOrdersAsync
      parameters:
        - $ref: '#/parameters/orderIdentifiers'
      responses:
        '200':
          description: Provides a list of deleted orders references and ids and errors for orders that failed to delete
          schema:
            $ref: '#/definitions/DeleteOrdersResource'
        '400':
          description: Bad Request (Request has missing or invalid parameters and cannot be parsed)
          schema:
            type: array
            items:
              $ref: '#/definitions/OrderErrorInfo'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (Feature not available)
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - Bearer: []

  /orders/status:
    put:
      tags:
        - Orders
      summary: Set order status
      operationId: UpdateOrdersStatusAsync
      parameters:
        - name: request
          in: body
          required: true
          description: |
            At least one of 'orderIdentifier' and 'orderReference' is required. Providing both is disallowed to avoid ambiguity.

            When the status is set to 'despatchedByOtherCourier', if the optional parameter 'trackingNumber' is provided
            then the parameters 'despatchDate', 'shippingCarrier' and 'shippingService' are also required.
            The maximum collection length is 100.
          schema:
            $ref: '#/definitions/UpdateOrdersStatusRequest'
      responses:
        '200':
          description: Provides a list of orders
          schema:
            $ref: '#/definitions/UpdateOrderStatusResponse'
        '400':
          description: Bad Request (Request has missing or invalid parameters and cannot be parsed)
          schema:
              type: array
              items:
                $ref: '#/definitions/OrderUpdateError'
        '401':
          description: Unauthorized
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - Bearer: []

  /orders/{orderIdentifiers}/full:
    get:
      tags:
        - Orders
      summary: Retrieve details of the specific orders
      description: Reserved for ChannelShipper customers only.
      operationId: GetSpecificOrdersWithDetailsAsync
      parameters:
        - $ref: '#/parameters/orderIdentifiers'
      responses:
        '200':
          description: Return detailed information about the orders
          schema:
            type: array
            items:
              $ref: '#/definitions/GetOrderDetailsResource'
        '400':
          description: Bad Request (Request has missing or invalid parameters and cannot be parsed)
          schema:
            type: array
            items:
              $ref: '#/definitions/OrderErrorResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (Feature not available)
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - Bearer: []

  /orders:
    get:
      tags:
        - Orders
      summary: Retrieve pageable list of orders
      operationId: GetOrdersAsync
      parameters:
        - $ref: '#/parameters/pageSize'
        - $ref: '#/parameters/startDateTime'
        - $ref: '#/parameters/endDateTime'
        - $ref: '#/parameters/continuationToken'
      responses:
        '200':
          description: Return pageable list of orders
          schema:
            $ref: '#/definitions/GetOrdersResponse'
        '400':
          description: Bad Request (Request has missing or invalid parameters and cannot be parsed)
          schema:
            $ref: '#/definitions/ErrorResponse'
        '401':
          description: Unauthorized
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - Bearer: []

    post:
      tags:
        - Orders
      summary: Create orders
      operationId: CreateOrdersAsync
      parameters:
        - name: request
          in: body
          required: true
          schema:
            $ref: '#/definitions/CreateOrdersRequest'
      responses:
        '200':
          description: Request Processed Successfully
          schema:
            $ref: '#/definitions/CreateOrdersResponse'
        '400':
          description: Bad Request (Request has missing or invalid parameters and cannot be parsed)
          schema:
            $ref: '#/definitions/ErrorResponse'
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - Bearer: []

  /orders/full:
    get:
      tags:
        - Orders
      summary: Retrieve pageable list of orders with details
      description: Reserved for ChannelShipper customers only.
      operationId: GetOrdersWithDetailsAsync
      parameters:
        - $ref: '#/parameters/pageSize'
        - $ref: '#/parameters/startDateTime'
        - $ref: '#/parameters/endDateTime'
        - $ref: '#/parameters/continuationToken'
      responses:
        '200':
          description: Return a pageable list of orders with details
          schema:
            $ref: '#/definitions/GetOrdersDetailsResponse'
        '400':
          description: Bad Request (Request has missing or invalid parameters and cannot be parsed)
          schema:
            $ref: '#/definitions/ErrorResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (Feature not available)
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - Bearer: []

  /orders/{orderIdentifiers}/label:
    get:
      tags:
        - Labels
      summary: Return a single PDF file with generated label and/or associated document(s)
      description: |
        Reserved for OBA customers only.

        The account "Label format" settings page will control the page format settings used to print the postage label
        and associated documents.
      operationId: GetOrdersLabelAsync
      parameters:
        - $ref: '#/parameters/orderIdentifiers'
        - $ref: '#/parameters/documentType'
        - $ref: '#/parameters/includeReturnsLabel'
        - $ref: '#/parameters/includeCN'
      produces:
        - application/pdf
        - application/json
      responses:
        '200':
          description: Return the PDF file with labels
          schema:
            type: file
        '400':
          description: Bad Request (Request has missing or invalid parameters and cannot be parsed)
          schema:
            type: array
            items:
              $ref: '#/definitions/OrderErrorResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (Feature available for OBA accounts only)
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - Bearer: []

  /manifests:
    post:
      tags:
        - Manifests
      summary: Manifest eligible orders
      description: |
        Manifest all orders in 'Label Generated' and 'Despatched' statuses and return manifest paperwork where possible.
      operationId: ManifestEligibleAsync
      parameters:
        - name: request
          in: body
          required: false
          schema:
            $ref: '#/definitions/ManifestEligibleOrdersRequest'
      responses:
        '201':
          description: The Manifest all eligible orders request was successful.
          schema:
            $ref: '#/definitions/ManifestOrdersResponse'
        '202':
          description: The Manifest eligible orders request was successful but PDF is not yet available.
          schema:
            $ref: '#/definitions/ManifestOrdersResponse'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/ManifestErrorsResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (Feature not available)
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ManifestErrorsResponse'
      security:
      - Bearer: []

  /manifests/retry/{manifestIdentifier}:
    post:
      tags:
        - Manifests
      summary: Retry manifest
      description: Retry a manifest operation if the eligible orders were not able to be successfully processed.
      operationId: RetryManifestAsync
      parameters:
        - $ref: '#/parameters/manifestIdentifier'
      responses:
        '201':
          description: The Retry Manifest request was successful.
          schema:
            $ref: '#/definitions/ManifestOrdersResponse'
        '202':
          description: The retry request was successfully processed but documentation is not yet available.
          schema:
            $ref: '#/definitions/ManifestOrdersResponse'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/ManifestErrorsResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (Feature not available)
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ManifestErrorsResponse'
      security:
      - Bearer: []

  /manifests/{manifestIdentifier}:
    get:
      tags:
        - Manifests
      summary: Get manifest
      description: Retrieve manifest paperwork for a previously successful manifest eligible orders call.
      operationId: GetManifestAsync
      parameters:
        - $ref: '#/parameters/manifestIdentifier'
      responses:
        '200':
          description: The Get Manifest request was successfully processed.
          schema:
            $ref: '#/definitions/ManifestDetailsResponse'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/ManifestErrorsResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (Feature not available)
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ManifestErrorsResponse'
      security:
      - Bearer: []

  /returns/services:
    get:
      tags:
        - Returns
      summary: List available return services
      description: Returns a list of return services that can be used when creating return shipments.
      security:
        - Bearer: []
      responses:
        '200':
          description: Lists all available return services for generating return labels
          schema:
            $ref: '#/definitions/GetServicesResponse'
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error

  /returns:
    post:
      tags:
        - Returns
      summary: Create a return shipment
      description: Creates a return label and returns shipment details including tracking number, QR code, and label.
      security:
        - Bearer: []
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/CreateReturnRequest'
          description: Return creation request
      responses:
        '200':
          description: Successfully created return shipment
          schema:
            $ref: '#/definitions/CreateReturnResponse'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error

tags:
  - name: Rate Limits
    description: Exceeding the rate limit of 5 calls per second will result in a 429 error.
  - name: Version
  - name: Orders
  - name: Labels
  - name: Manifests
  - name: Returns
    description: Reserved for OBA customers only.

parameters:

  orderIdentifiers:
    in: path
    name: orderIdentifiers
    required: true
    type: string
    description: One or several Order Identifiers or Order References separated by semicolon. The maximum number of identifiers is 100.

  includeCN:
    in: query
    name: includeCN
    required: false
    type: boolean
    description: Include CN22/CN23 with label.

  includeReturnsLabel:
    in: query
    name: includeReturnsLabel
    required: false
    type: boolean
    description: Include returns label. Required when documentType is set to 'postageLabel'.

  documentType:
    in: query
    name: documentType
    required: true
    type: string
    enum:
      - postageLabel
      - despatchNote
      - CN22
      - CN23
    description: Document generation mode.

  page:
    in: query
    name: page
    required: false
    type: integer
    minimum: 1
    maximum: 100
    default: 1
    description: The number of page to return

  pageSize:
    in: query
    name: pageSize
    required: false
    type: integer
    minimum: 1
    maximum: 100
    default: 25
    description: The number of items to return

  startDateTime:
    in: query
    name: startDateTime
    type: string
    format: date-time
    required: false
    description: Date and time lower bound for items filtering

  endDateTime:
    in: query
    name: endDateTime
    type: string
    format: date-time
    required: false
    description: Date and time upper bound for items filtering

  continuationToken:
    in: query
    name: continuationToken
    type: string
    required: false
    description: The token for retrieving the next page of items

  manifestIdentifier:
    in: path
    name: manifestIdentifier
    required: true
    type: integer
    description: The manifest number returned from the initial manifest eligible orders endpoint call

definitions:

  GetVersionResource:
    required:
      - releaseDate
    type: object
    properties:
      commit:
        type: string
      build:
        type: string
      release:
        type: string
      releaseDate:
        type: string
        format: date-time

  ErrorResponse:
    required:
      - message
    type: object
    properties:
      code:
        type: string
      message:
        type: string
      details:
        type: string

  GetOrderInfoResource:
    required:
      - orderIdentifier
      - createdOn
    type: object
    properties:
      orderIdentifier:
        type: integer
      orderReference:
        type: string
      createdOn:
        type: string
        format: date-time
      orderDate:
        type: string
        format: date-time
      printedOn:
        type: string
        format: date-time
      manifestedOn:
        type: string
        format: date-time
      shippedOn:
        type: string
        format: date-time
      trackingNumber:
        type: string
      packages:
        type: array
        items:
          $ref: '#/definitions/CreatePackagesResponse'

  GetOrdersResponse:
    type: object
    properties:
      orders:
        type: array
        items:
          $ref: '#/definitions/GetOrderInfoResource'
      continuationToken:
        type: string

  GetOrdersDetailsResponse:
    type: object
    properties:
      orders:
        type: array
        items:
          $ref: '#/definitions/GetOrderDetailsResource'
      continuationToken:
        type: string

  UpdateOrderStatusResponse:
    type: object
    properties:
      updatedOrders:
        type: array
        items:
          $ref: '#/definitions/UpdatedOrderInfo'
      errors:
        type: array
        items:
          $ref: '#/definitions/OrderUpdateError'

  UpdatedOrderInfo:
    type: object
    properties:
      orderIdentifier:
        type: integer
      orderReference:
        type: string
      status:
        type: string
        description: Current status of the order

  DeleteOrdersResource:
    type: object
    properties:
      deletedOrders:
        type: array
        items:
          $ref: '#/definitions/DeletedOrderInfo'
      errors:
        type: array
        items:
          $ref: '#/definitions/OrderErrorInfo'

  DeletedOrderInfo:
    type: object
    properties:
      orderIdentifier:
        type: integer
      orderReference:
        type: string
      orderInfo:
        type: string

  CreateOrdersRequest:
    required:
      - items
    type: object
    properties:
      items:
        minLength: 1
        type: array
        items:
          $ref: '#/definitions/CreateOrderRequest'

  UpdateOrdersStatusRequest:
    type: object
    properties:
      items:
        minLength: 1
        type: array
        items:
          $ref: '#/definitions/UpdateOrderStatusRequest'

  UpdateOrderStatusRequest:
    type: object
    properties:
      orderIdentifier:
        type: integer
        format: int32
      orderReference:
        type: string
      status:
        type: string
        enum:
          - new
          - despatchedByOtherCourier
          - despatched
      trackingNumber:
        type: string
      despatchDate:
        format: date-time
        type: string
      shippingCarrier:
        type: string
      shippingService:
        type: string

  CreateOrderRequest:
    required:
      - recipient
      - orderDate
      - subtotal
      - shippingCostCharged
      - total
    type: object
    properties:
      orderReference:
        maxLength: 40
        type: string
      isRecipientABusiness:
        type: boolean
      recipient:
        $ref: '#/definitions/RecipientDetailsRequest'
      sender:
        $ref: '#/definitions/SenderDetailsRequest'
      billing:
        $ref: '#/definitions/BillingDetailsRequest'
      packages:
        type: array
        items:
          $ref: '#/definitions/ShipmentPackageRequest'
      orderDate:
        format: date-time
        type: string
      plannedDespatchDate:
        format: date-time
        type: string
      specialInstructions:
        type: string
        maxLength: 500
      subtotal:
        type: number
        format: decimal
        multipleOf: 0.01
        minimum: 0
        maximum: 999999
      shippingCostCharged:
        type: number
        format: decimal
        multipleOf: 0.01
        minimum: 0
        maximum: 999999
      otherCosts:
        type: number
        format: decimal
        multipleOf: 0.01
        minimum: 0
        maximum: 999999
      customsDutyCosts:
        type: number
        format: decimal
        multipleOf: 0.01
        minimum: 0
        maximum: 99999.99
      total:
        format: decimal
        multipleOf: 0.01
        type: number
        minimum: 0
        maximum: 999999
      currencyCode:
        type: string
        maxLength: 3
      postageDetails:
        $ref: '#/definitions/PostageDetailsRequest'
      tags:
        type: array
        items:
          $ref: '#/definitions/TagRequest'
      label:
        $ref: '#/definitions/LabelGenerationRequest'
      orderTax:
        format: decimal
        multipleOf: 0.01
        type: number
        minimum: 0
        maximum: 999999
      containsDangerousGoods:
        type: boolean
      dangerousGoodsUnCode:
        type: string
        maxLength: 4
      dangerousGoodsDescription:
        type: number
        maxLength: 500
      dangerousGoodsQuantity:
        type: number
      importer:
        $ref: '#/definitions/Importer'

  LabelGenerationRequest:
    type: object
    description: Reserved for OBA customers only.
    required:
      - includeLabelInResponse
    properties:
      includeLabelInResponse:
        type: boolean
      includeCN:
        type: boolean
      includeReturnsLabel:
        type: boolean

  TagRequest:
    type: object
    properties:
      key:
        type: string
        maxLength: 100
      value:
        type: string
        maxLength: 100

  RecipientDetailsRequest:
    type: object
    properties:
      address:
        $ref: '#/definitions/AddressRequest'
      phoneNumber:
        maxLength: 25
        type: string
      emailAddress:
        maxLength: 254
        type: string
      addressBookReference:
        maxLength: 100
        type: string

  AddressRequest:
    required:
      - addressLine1
      - city
      - countryCode
    type: object
    properties:
      fullName:
        maxLength: 210
        type: string
      companyName:
        maxLength: 100
        type: string
      addressLine1:
        maxLength: 100
        type: string
      addressLine2:
        maxLength: 100
        type: string
      addressLine3:
        maxLength: 100
        type: string
      city:
        maxLength: 100
        type: string
      county:
        maxLength: 100
        type: string
      postcode:
        maxLength: 20
        type: string
      countryCode:
        maxLength: 3
        type: string

  BillingDetailsRequest:
    type: object
    properties:
      address:
        $ref: '#/definitions/AddressRequest'
      phoneNumber:
        maxLength: 25
        type: string
      emailAddress:
        maxLength: 254
        type: string

  SenderDetailsRequest:
    type: object
    properties:
      tradingName:
        type: string
        maxLength: 250
      phoneNumber:
        maxLength: 25
        type: string
      emailAddress:
        maxLength: 254
        type: string

  ShipmentPackageRequest:
    required:
      - weightInGrams
      - packageFormatIdentifier
    type: object
    properties:
      weightInGrams:
        format: int32
        maximum: 30000
        minimum: 1
        type: integer
      packageFormatIdentifier:
        type: string
        description: "Enum: 'undefined', 'letter', 'largeLetter', 'smallParcel', 'mediumParcel', 'largeParcel', 'parcel', 'documents'"
      customPackageFormatIdentifier:
        type: string
      dimensions:
        $ref: '#/definitions/DimensionsRequest'
      contents:
        type: array
        items:
          $ref: '#/definitions/ProductItemRequest'

  PostageDetailsRequest:
    type: object
    properties:
      sendNotificationsTo:
        type: string
        enum:
          - sender
          - recipient
          - billing
      serviceCode:
        type: string
        maxLength: 10
      carrierName:
        type: string
        maxLength: 50
      serviceRegisterCode:
        type: string
        maxLength: 2
      consequentialLoss:
        type: integer
        format: int32
        minimum: 0
        maximum: 10000
      receiveEmailNotification:
        type: boolean
      receiveSmsNotification:
        type: boolean
      guaranteedSaturdayDelivery:
        type: boolean
      requestSignatureUponDelivery:
        type: boolean
      isLocalCollect:
        type: boolean
      safePlace:
        type: string
        maxLength: 90
      department:
        type: string
        maxLength: 150
      AIRNumber:
        type: string
        maxLength: 50
      IOSSNumber:
        type: string
        maxLength: 50
      requiresExportLicense:
        type: boolean
      commercialInvoiceNumber:
        type: string
        maxLength: 35
      commercialInvoiceDate:
        type: string
        format: date-time
      recipientEoriNumber:
        type: string

  ProductItemRequest:
    required:
      - quantity
    type: object
    properties:
      name:
        type: string
        maxLength: 800
      SKU:
        type: string
        maxLength: 100
      quantity:
        format: int32
        type: integer
        minimum: 1
        maximum: 999999
      unitValue:
        type: number
        format: decimal
        multipleOf: 0.01
        minimum: 0
        maximum: 999999
      unitWeightInGrams:
        type: integer
        minimum: 0
        maximum: 999999
      customsDescription:
        type: string
        maxLength: 50
      extendedCustomsDescription:
        type: string
        maxLength: 300
      customsCode:
        type: string
        maxLength: 10
      originCountryCode:
        type: string
        maxLength: 3
      customsDeclarationCategory:
        type: string
        enum:
          - none
          - gift
          - commercialSample
          - documents
          - other
          - returnedGoods
          - commercialSaleOfGoods
          - eCommerceSaleOfGoods
      requiresExportLicence:
        type: boolean
      stockLocation:
        type: string
        maxLength: 50
      useOriginPreference:
        type: boolean
      supplementaryUnits:
        type: string
        maxLength: 17
      licenseNumber:
        type: string
        maxLength: 41
      certificateNumber:
        type: string
        maxLength: 41

  Importer:
    type: object
    properties:
      companyName:
        type: string
        maxLength: 100
      addressLine1:
        type: string
        maxLength: 100
      addressLine2:
        type: string
        maxLength: 100
      addressLine3:
        type: string
        maxLength: 100
      city:
        type: string
        maxLength: 100
      postcode:
        type: string
        maxLength: 20
      country:
        type: string
        maxLength: 100
      businessName:
        type: string
        maxLength: 100
      contactName:
        type: string
        maxLength: 100
      phoneNumber:
        type: string
        maxLength: 25
      emailAddress:
        type: string
        maxLength: 254
      vatNumber:
        type: string
        maxLength: 15
      taxCode:
        type: string
        maxLength: 25
      eoriNumber:
        type: string
        maxLength: 18
      isABusiness:
        type: boolean

  DimensionsRequest:
    type: object
    required:
      - heightInMms
      - widthInMms
      - depthInMms
    properties:
      heightInMms:
        type: integer
        format: int32
      widthInMms:
